name: Build Tauri App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
        include:
          - target: x86_64-pc-windows-msvc
            arch_name: 64bit
          - target: i686-pc-windows-msvc
            arch_name: 32bit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, ${{ matrix.target }}

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk (WASM Bundler)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Install NPM dependencies
        run: npm install

      - name: Build WebAssembly project
        run: trunk build --release

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: v__VERSION__
          releaseName: "FormBuilder v__VERSION__"
          releaseBody: "Auto-generated release"
          releaseDraft: true
          prerelease: false

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: formbuilder-installer-${{ matrix.arch_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: formbuilder-portable-${{ matrix.arch_name }}
          path: src-tauri/target/${{ matrix.target }}/release/formulaire.exe
