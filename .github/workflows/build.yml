name: Build Tauri App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write  # Required by SignPath
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, i686-pc-windows-msvc

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk (WASM Bundler)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Install NPM dependencies
        run: npm install

      - name: Build WebAssembly project
        run: trunk build --release

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target i686-pc-windows-msvc
          tagName: v__VERSION__
          releaseName: "FormBuilder v__VERSION__"
          releaseBody: "Auto-generated release"
          releaseDraft: true
          prerelease: false

      # ── Stage 1: Upload the UNSIGNED portable EXE as a temp artifact ──────
      - name: Upload unsigned portable EXE for signing
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: formbuilder-unsigned
          path: src-tauri/target/i686-pc-windows-msvc/release/formulaire.exe

      # ── Stage 2: Submit to SignPath for free OSS code signing ─────────────
      - name: Sign EXE with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: formulaire
          signing-policy-slug: release-signing
          artifact-configuration-slug: formulaire-portable
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-output

      # ── Stage 3: Upload the SIGNED portable EXE ──────────────────────────
      - name: Upload signed portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: formbuilder-portable-SIGNED
          path: signed-output/formulaire.exe

      # ── Also upload the NSIS/MSI installers (unsigned, optional) ─────────
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: formbuilder-installer
          path: |
            src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
